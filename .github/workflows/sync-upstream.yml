name: Sync upstream and apply exclusions

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true

      - name: Add upstream remote
        run: git remote add upstream https://github.com/ph00lt0/blocklist.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream into master
        run: |
          # Attempt merge; capture exit code so we know if --continue is needed
          merge_exit=0
          git merge upstream/master --no-edit --allow-unrelated-histories || merge_exit=$?

          # Generic conflict resolution:
          #   fork-owned files and .github/workflows/* → keep ours
          #   everything else (upstream blocklists, Python modules, etc.) → take theirs
          while IFS= read -r f; do
            case "$f" in
              apply-exclusions.sh|my-exclusions.txt|my-inclusions.txt|my-additions.txt|CLAUDE.md|CONTEXT.md|.github/workflows/*)
                git checkout --ours -- "$f" && git add "$f"
                ;;
              *)
                git checkout --theirs -- "$f" && git add "$f"
                ;;
            esac
          done < <(git diff --name-only --diff-filter=U)

          # Fail loudly if any unmerged paths remain (never silently commit conflict markers)
          unmerged=$(git diff --name-only --diff-filter=U)
          if [ -n "$unmerged" ]; then
            echo "ERROR: unresolved merge conflicts remain in: $unmerged"
            exit 1
          fi

          # Complete the merge commit if it was a non-fast-forward (had conflicts or needed --no-edit)
          if [ "$merge_exit" -ne 0 ]; then
            git -c core.editor=true merge --continue
          fi

          # Strip upstream-added workflow files — this fork only owns sync-upstream.yml
          find .github/workflows -mindepth 1 -maxdepth 1 -type f \
            ! -name 'sync-upstream.yml' -print -delete
          git add -A .github/workflows

      - name: Apply exclusions and restore fork-specific files
        run: |
          chmod +x apply-exclusions.sh
          ./apply-exclusions.sh

      - name: Commit and push if changed
        run: |
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync upstream $(date '+%Y-%m-%d') + apply exclusions"
          git push origin master

